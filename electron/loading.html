<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS System — Iniciando...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', Arial, sans-serif;
         display: flex; align-items: center; justify-content: center; height: 100vh; }
  .box { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 40px;
         max-width: 520px; width: 90%; text-align: center; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  .spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #22c55e;
             border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #log { background: #0f172a; border-radius: 8px; padding: 12px; margin-top: 16px;
         text-align: left; font-size: 13px; font-family: 'Consolas', monospace;
         max-height: 200px; overflow-y: auto; color: #94a3b8; }
  .ok { color: #22c55e; } .err { color: #ef4444; } .warn { color: #f59e0b; }
</style>
</head>
<body>
<div class="box">
  <h1>🏪 POS System</h1>
  <p>Iniciando servidor...</p>
  <div class="spinner"></div>
  <div id="log"></div>
</div>
<script>
const logEl = document.getElementById('log');
function log(msg, cls) {
  const line = document.createElement('div');
  line.className = cls || '';
  line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

log('⏳ Verificando servidor en http://localhost:3000 ...', 'warn');

let attempts = 0;
function check() {
  attempts++;
  fetch('http://localhost:3000/api/sync')
    .then(r => {
      if (r.ok) {
        log('✅ Servidor listo! Redirigiendo...', 'ok');
        setTimeout(() => location.href = 'http://localhost:3000', 500);
        return;
      }
      throw new Error('Status ' + r.status);
    })
    .catch(e => {
      log('⏳ Intento ' + attempts + '/30 — ' + e.message);
      if (attempts < 30) setTimeout(check, 1000);
      else log('❌ No se pudo conectar. Revisa si el servidor arrancó.', 'err');
    });
}
setTimeout(check, 1500);
</script>
</body>
</html>
